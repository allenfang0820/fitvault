<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 轨迹分析仪 - AI 增强版</title>
    <!-- 本地优先，减少首屏等待；若本地资源缺失再回退到 CDN -->
    <script>
        window.CESIUM_BASE_URL = 'lib/Cesium/';
    </script>
    <link href="lib/Cesium/Widgets/widgets.css" rel="stylesheet" onerror="this.href='https://cdn.jsdelivr.net/npm/cesium@1.105.1/Build/Cesium/Widgets/widgets.css'">
    <style>
        :root {
            --primary: #2ecc71;
            --primary-hover: #27ae60;
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.85);
            --text: #f8fafc;
        }
        body {
            margin: 0; padding: 0; overflow: hidden; background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text); touch-action: none; overscroll-behavior: none;
        }
        #cesiumContainer { width: 100vw; height: 100vh; margin: 0; padding: 0; touch-action: none; }
        
        #info-panel {
            position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
            background: var(--panel); border-radius: 10px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            z-index: 10; width: 97%; max-width: 1100px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #info-panel.collapsed { transform: translate(-50%, calc(-100% - 8px)); }

        .panel-inner {
            padding: 8px 14px; border-radius: 10px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            justify-content: flex-start;
            max-height: none; overflow: visible;
        }
        .panel-inner::-webkit-scrollbar { width: 0; }

        .toggle-panel-btn {
            position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
            width: 56px; height: 22px; background: var(--panel); color: white;
            border: 1px solid rgba(255,255,255,0.12); border-top: none; border-radius: 0 0 10px 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15); font-size: 12px; backdrop-filter: blur(10px);
        }
        .toggle-panel-btn:hover { background: rgba(30, 41, 59, 0.95); }
        
        .section-stats { display: flex; align-items: center; gap: 14px; flex: 0 1 auto; }
        .section-controls { display: flex; align-items: center; gap: 8px; flex: 0 1 auto; }
        .section-actions { display: flex; align-items: center; gap: 8px; flex: 0 1 auto; }

        #track-title { margin: 0; font-size: 0.85rem; color: var(--primary); font-weight: 600; white-space: nowrap; border-bottom: none; padding-bottom: 0; }
        .stat-grid { display: flex; gap: 10px; font-size: 0.8rem; }
        .stat-item span { display: none; }
        .stat-item b { font-size: 0.9rem; }
        .stat-item::before { content: attr(data-label); display: block; color: #64748b; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .control-group { margin: 0; padding: 0; border: none; }
        .control-group label { display: none; }
        #progress-slider { width: 120px; height: 4px; }
        
        .switch-row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-top: 0; padding-top: 0; border-top: none; }
        .switch-label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #cbd5e1; cursor: pointer; user-select: none; }
        .switch-label input { accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; margin: 0; }

        .btn-row { display: flex; gap: 6px; }

        .secondary-btn, .primary-btn {
            width: auto; padding: 5px 10px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
            font-size: 0.72rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 4px; border: none;
        }

        #loading {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg); z-index: 100; transition: opacity 0.8s;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .cesium-viewer-bottom { display: none !important; }

        /* AI 侧边栏 */
        #ai-sidebar {
            position: fixed; top: 50%; right: 0; transform: translateY(-50%);
            z-index: 20; display: flex; align-items: stretch;
            transition: right 0.3s ease;
        }
        #ai-sidebar.collapsed { right: -350px; }
        #ai-sidebar-btn {
            writing-mode: vertical-rl; text-orientation: mixed;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 8px 0 0 8px;
            padding: 14px 6px; cursor: pointer; font-size: 0.75rem;
            font-weight: bold; letter-spacing: 1px; box-shadow: -3px 0 12px rgba(0,0,0,0.3);
            margin-top: 0;
        }
        #ai-sidebar-btn:hover { opacity: 0.9; }
        #ai-sidebar-body {
            width: 320px; background: rgba(15,23,42,0.93);
            backdrop-filter: blur(12px); border-radius: 10px 0 0 10px;
            border: 1px solid rgba(255,255,255,0.1); border-right: none;
            height: 85vh; padding: 12px 14px; display: flex; flex-direction: column;
        }

        .tab-btn {
            background: transparent; border: none; color: #94a3b8; font-size: 0.9rem; 
            font-weight: bold; cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: all 0.2s;
        }
        .tab-btn.active { background: rgba(255,255,255,0.1); color: #f8fafc; }
        .tab-btn:hover:not(.active) { color: #e2e8f0; }
        .icon-btn { background: transparent; border: none; color: #94a3b8; font-size: 1.1rem; cursor: pointer; }
        .icon-btn:hover { color: white; }
        .tab-content { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent; }
        .tab-content::-webkit-scrollbar { width: 4px; }
        .tab-content::-webkit-scrollbar-track { background: transparent; }
        .tab-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

        .ai-section {
            background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .ai-section h3 { margin: 0 0 4px 0; font-size: 0.78rem; color: #e2e8f0; }
        .ai-badge {
            display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 0.65rem;
            font-weight: bold; margin-left: 4px; vertical-align: middle;
        }
        .ai-badge-easy { background: #22c55e33; color: #4ade80; }
        .ai-badge-moderate { background: #eab30833; color: #facc15; }
        .ai-badge-hard { background: #ef444433; color: #f87171; }
        .ai-badge-extreme { background: #dc262633; color: #fca5a5; }
        .ai-stat { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 2px 0; line-height: 1.4; }
        .ai-stat-label { color: #94a3b8; }
        .ai-stat-value { color: #f8fafc; font-weight: 500; }
        .ai-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 3px 0; overflow: hidden; }
        .ai-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
        .rest-point { padding: 4px 6px; background: rgba(52,152,219,0.08); border-radius: 4px; margin-bottom: 4px; border-left: 2px solid #3498db; }
        .rest-point-title { font-weight: 600; color: #3498db; font-size: 0.75rem; }
        .rest-point-info { font-size: 0.7rem; color: #94a3b8; }
        .supply-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; padding: 2px 0; line-height: 1.3; }
        .pace-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; padding: 2px 0; }
        .pace-seg-name { color: #94a3b8; }
        .pace-seg-val { color: #f8fafc; font-weight: 500; font-variant-numeric: tabular-nums; }

        .secondary-btn { background: rgba(255,255,255,0.1); color: #f8fafc; border: 1px solid rgba(255,255,255,0.2); }
        .secondary-btn:hover { background: rgba(255,255,255,0.2); }
        
        .primary-btn { background: var(--primary); color: #0f172a; }
        .primary-btn:hover { background: var(--primary-hover); }

        .modal-base {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; background: var(--panel); backdrop-filter: blur(16px);
            border-radius: 16px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); z-index: 1000;
        }
        #edit-modal { border: 1px solid rgba(46, 204, 113, 0.4); max-width: 350px; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: 999; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; margin-bottom: 16px; flex-shrink: 0; }
        .modal-header h2 { margin: 0; font-size: 1.2rem; color: #2ecc71; display: flex; align-items: center; gap: 8px; }
        
        .close-btn { background: transparent; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; padding: 0 8px; }
        .close-btn:hover { color: white; }

        .modal-input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); 
            color: white; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 1rem;
        }
        .modal-input:focus { border-color: var(--primary); }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9);
            color: #94a3b8; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 50; transition: opacity 0.3s;
        }

        #profile-container {
            position: fixed; bottom: 0; left: 0; width: 100vw; height: 160px;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0));
            border-top: 1px solid rgba(255,255,255,0.1); z-index: 5; pointer-events: none; display: flex; flex-direction: column;
        }
        #profile-canvas { width: 100%; height: 100%; display: block; pointer-events: auto; cursor: crosshair; }
        
        /* 运动类型选择卡片 */
        .sport-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px;
            text-align: center; cursor: pointer; transition: all 0.2s; flex: 1;
        }
        .sport-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .sport-card h3 { margin: 10px 0 5px 0; color: #f8fafc; font-size: 1.1rem; }
        .sport-card p { margin: 0; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div id="loading-text" style="color: #94a3b8; font-size: 0.9rem;">正在启动 3D 分析仪...</div>
</div>

<div id="info-panel">
    <div class="toggle-panel-btn" onclick="togglePanel()">▲</div>
    <div class="panel-inner">
        <div class="section-stats">
            <span id="track-title" style="font-size:0.85rem;color:var(--primary);font-weight:600;">等待导入轨迹...</span>
            <div class="stat-grid">
                <div class="stat-item" data-label="里程"><b id="val-dist">--</b> <span style="color:#64748b;font-size:0.65rem;">km</span></div>
                <div class="stat-item" data-label="耗时"><b id="val-time">--</b></div>
                <div class="stat-item" data-label="爬升"><b id="val-gain">--</b> <span style="color:#64748b;font-size:0.65rem;">m</span></div>
                <div class="stat-item" data-label="最高"><b id="val-max">--</b> <span style="color:#64748b;font-size:0.65rem;">m</span></div>
            </div>
        </div>
        <div id="mini-profile" style="display:flex;align-items:center;gap:8px;padding:4px 10px;background:rgba(46,204,113,0.07);border:1px solid rgba(46,204,113,0.2);border-radius:8px;font-size:0.7rem;display:none;">
            <span style="color:#2ecc71;font-weight:600;">🏃</span>
            <span id="vp-name" style="color:#f8fafc;font-weight:500;">--</span>
            <span style="color:#64748b;">·</span>
            <span id="vp-age" style="color:#94a3b8;">--岁</span>
            <span style="color:#64748b;">·</span>
            <span style="color:#2ecc71;">HRV</span><b id="vp-hrv" style="color:#2ecc71;">--</b><span style="color:#64748b;font-size:0.6rem;">ms</span>
            <span style="color:#64748b;">·</span>
            <span style="color:#94a3b8;">VO₂</span><b id="vp-vo2">--</b>
        </div>
        <div class="section-controls">
            <input type="range" id="progress-slider" min="0" max="100" step="0.5" value="100" style="width:120px;height:4px;">
            <span id="progress-val" style="font-size:0.7rem;color:#64748b;min-width:35px;">100%</span>
            <button id="btn-auto-rotate" class="secondary-btn">▶漫游</button>
            <button onclick="setViewProfile()" class="secondary-btn">⛰️剖面</button>
            <button class="primary-btn" onclick="triggerTrackImport()">📁导入</button>
        </div>
        <div class="section-actions">
            <button onclick="exportGPX()" class="secondary-btn">⬇️GPX</button>
            <button onclick="exportKML()" class="secondary-btn">⬇️KML</button>
            <label class="switch-label" style="font-size:0.7rem;white-space:nowrap;"><input type="checkbox" id="toggle-cp" checked>🚩</label>
            <label class="switch-label" style="font-size:0.7rem;white-space:nowrap;"><input type="checkbox" id="toggle-km" checked>📏</label>
            <label class="switch-label" style="font-size:0.7rem;white-space:nowrap;"><input type="checkbox" id="toggle-peak" checked>⛰️</label>
        </div>
        <input type="file" id="file-upload" accept=".fit,.gpx,.kml" style="display:none;">
    </div>
</div>

<div id="toast" style="opacity: 0;">提示信息</div>
<div id="modal-overlay"></div>

<!-- 运动类型选择弹窗 -->
<div id="sport-type-modal" class="modal-base" style="max-width: 450px;">
    <h2 style="margin:0 0 20px 0; color: white; text-align: center;">🎯 选择运动类型</h2>
    <p style="color: #94a3b8; font-size: 0.85rem; text-align: center; margin-bottom: 20px;">为了提供准确的体能分析和成绩预测，请选择本次轨迹对应的运动。</p>
    <div style="display: flex; gap: 15px;">
        <div class="sport-card" onclick="confirmSportType('hiking')">
            <div style="font-size: 2.5rem;">🥾</div>
            <h3>徒步 / 登山</h3>
            <p>侧重耐力与平稳心率，更关注负重与补给</p>
        </div>
        <div class="sport-card" onclick="confirmSportType('trail_running')">
            <div style="font-size: 2.5rem;">🏃‍♂️</div>
            <h3>越野跑</h3>
            <p>侧重速度与爬坡能力，配速要求与心率区间更高</p>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal-base">
    <div class="modal-header">
        <h2 id="edit-modal-title">编辑打卡点</h2>
        <button class="close-btn" onclick="closeModals()">&times;</button>
    </div>
    <input type="text" id="edit-cp-name" class="modal-input" placeholder="输入打卡点名称..." autocomplete="off">
    <div style="display: flex; gap: 10px;">
        <button onclick="saveCp()" class="primary-btn" style="margin-top: 0; flex: 1;">保存</button>
        <button id="btn-delete-cp" onclick="deleteCp()" class="secondary-btn" style="margin-top: 0; color: #ef4444; border-color: rgba(239,68,68,0.3); flex: 1;">删除</button>
    </div>
</div>

<div id="llm-config-modal" class="modal-base" style="max-width: 400px; border: 1px solid rgba(168, 85, 247, 0.4);">
    <div class="modal-header">
        <h2 style="color: #c084fc;">⚙️ 大模型 API 配置</h2>
        <button class="close-btn" onclick="closeModals()">&times;</button>
    </div>
    <div style="margin-bottom: 12px;">
        <label style="font-size: 0.8rem; color: #94a3b8;">服务商 (Provider)</label>
        <select id="llm-provider" class="modal-input" onchange="updateLLMModels()" style="margin-top: 4px; background: rgba(15,23,42,0.8); cursor:pointer;">
            <option value="local_mcp">本地网关 + MCP (如 OpenClaw)</option>
            <option value="deepseek">DeepSeek (深度求索)</option>
            <option value="zhipu">智谱清言 (GLM)</option>
            <option value="moonshot">Moonshot (Kimi)</option>
            <option value="qwen">通义千问 (阿里云)</option>
            <option value="minimax">MiniMax (海螺)</option>
            <option value="custom">纯自定义 (OpenAI 兼容)</option>
        </select>
    </div>
    <div style="margin-bottom: 12px;">
        <label style="font-size: 0.8rem; color: #94a3b8;">模型 ID / Agent 名</label>
        <select id="llm-model" class="modal-input" style="margin-top: 4px; background: rgba(15,23,42,0.8); cursor:pointer;"></select>
        <input type="text" id="llm-custom-model" class="modal-input" placeholder="例如: openclaw 或小高" style="display:none; margin-top: 4px;">
    </div>
    <div id="llm-custom-url-container" style="margin-bottom: 12px;">
        <label style="font-size: 0.8rem; color: #94a3b8;">接口地址 (支持本地服务/中转代理)</label>
        <input type="text" id="llm-custom-url" class="modal-input" placeholder="http://localhost:3000/v1/chat/completions" style="margin-top: 4px;" oninput="_markUrlModified()">
    </div>
    <div style="margin-bottom: 16px;">
        <label style="font-size: 0.8rem; color: #94a3b8;">API Key (Token) <span id="llm-api-key-hint" style="color:#f59e0b;font-size:0.7rem;">(选填)</span></label>
        <input type="password" id="llm-api-key" class="modal-input" placeholder="sk-..." style="margin-top: 4px;">
        <div style="font-size: 0.65rem; color: #64748b; margin-top: 4px;">API Key 仅保存在浏览器本地，确保隐私安全。</div>
    </div>
    <button onclick="saveLLMConfig()" class="primary-btn" style="width:100%; background: linear-gradient(135deg, #a855f7, #7e22ce); color: white;">💾 保存配置</button>
</div>

<div id="profile-container">
    <canvas id="profile-canvas"></canvas>
</div>

<div id="cesiumContainer"></div>

<!-- AI 侧边栏 -->
<div id="ai-sidebar" class="collapsed">
    <button id="ai-sidebar-btn" onclick="toggleAISidebar()">✨&nbsp;A&nbsp;I&nbsp;智&nbsp;能</button>
    <div id="ai-sidebar-body">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
            <div style="display: flex; gap: 10px;">
                <button id="tab-btn-report" class="tab-btn active" onclick="switchAITab('report')">📊 报告</button>
                <button id="tab-btn-chat" class="tab-btn" onclick="switchAITab('chat')">💬 对话</button>
            </div>
            <button class="icon-btn" onclick="openLLMConfig()" title="AI 配置">⚙️</button>
        </div>
        <div id="tab-report" class="tab-content active">
            <div id="ai-summary" style="color:#94a3b8; font-style:italic; font-size:0.75rem; text-align:center; padding-top:20px;">导入轨迹后自动生成分析...</div>
        </div>
        <div id="tab-chat" class="tab-content" style="display: none; flex-direction: column; height: 100%; overflow: hidden;">
            <div id="mcp-sync-bar" style="display:flex; gap:8px; padding:8px 0 6px; border-bottom:1px solid rgba(168,85,247,0.2); flex-shrink:0;">
                <div id="sync-loading" style="display:none; align-items:center; gap:6px; color:#a855f7; font-size:0.75rem;">
                    <div class="spinner" style="width:14px;height:14px;border-width:2px;border-color:rgba(168,85,247,0.2);border-left-color:#a855f7;"></div>
                    <span id="sync-loading-text">同步中...</span>
                </div>
                <button id="btn-sync-garmin" onclick="syncPersona('garmin')" style="background:rgba(0,149,255,0.15);border:1px solid rgba(0,149,255,0.4);border-radius:6px;color:#009dff;font-size:0.72rem;padding:4px 10px;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;gap:4px;transition:all 0.2s;" onmouseover="this.style.background='rgba(0,149,255,0.25)'" onmouseout="this.style.background='rgba(0,149,255,0.15)'">
                    📥 佳明
                </button>
                <button id="btn-sync-coros" onclick="syncPersona('coros')" style="background:rgba(255,89,0,0.15);border:1px solid rgba(255,89,0,0.4);border-radius:6px;color:#ff5900;font-size:0.72rem;padding:4px 10px;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;gap:4px;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,89,0,0.25)'" onmouseout="this.style.background='rgba(255,89,0,0.15)'">
                    📥 高驰
                </button>
            </div>
            <div id="llm-report-content" style="flex:1; overflow-y:auto; color:#e2e8f0; font-size:0.85rem; line-height:1.6; padding-right:5px; margin-bottom:10px;"></div>
            <div id="llm-chat-input-area" style="display: flex; gap: 8px; flex-shrink: 0; padding-top: 10px; border-top: 1px solid rgba(168, 85, 247, 0.2);">
                <input type="text" id="llm-chat-input" placeholder="输入 '复盘这次徒步' 或问 '这是哪'..." class="modal-input" style="margin:0; padding:8px; border-radius:6px; flex:1; font-size:0.85rem;" onkeypress="if(event.key === 'Enter') sendLLMChat()">
                <button onclick="sendLLMChat()" class="primary-btn" style="width: auto; padding: 8px 12px; background: linear-gradient(135deg, #a855f7, #7e22ce); border: none; border-radius: 6px;">发送</button>
            </div>
        </div>
    </div>
</div>

<script src="lib/Cesium/Cesium.js" onerror="this.src='https://cdn.jsdelivr.net/npm/cesium@1.105.1/Build/Cesium/Cesium.js'"></script>
<script src="lib/fit-parser.min.js" onerror="this.src='https://cdn.jsdelivr.net/npm/fit-parser@1.8.0/dist/fit-parser.min.js'"></script>
<script>
    if (!window.Cesium) {
        const failText = document.getElementById('loading-text');
        if (failText) failText.innerText = '3D 地球引擎加载失败，请检查本地资源或网络连接。';
        throw new Error('Cesium failed to load');
    }

    // ==========================================
    // 状态管理
    // ==========================================
    const appState = {
        points: [], placemarks: [], kmMarkers: [], peakMarkers: [],   
        minAltitude: 0, maxAltitude: 0, centerPosition: null, totalDist: 0,
        progress: 100, fullPositions: [], fullMinHeights: [], fullMaxHeights: [],
        showCP: true, showKM: true, showPeak: true,    
        editingCpId: null, pendingNewCp: null,
        remainingTrackEntity: null, completedTrackEntity: null, wallEntity: null,
        pointEntities: [], kmEntities: [], peakEntities: [],
        sportType: 'hiking' 
    };

    let currentRange = 4500; 
    let toastTimeout = null;

    const LLM_DEFAULT_URL = 'http://localhost:3000/v1/chat/completions';
    const PY_REPORT_TERRAIN = '__REPORT_TERRAIN__';
    const PY_REPORT_PERSONALIZED = '__REPORT_PERSONALIZED__';
    let currentLLMConfig = { provider: 'local_mcp', model: 'openclaw', url: LLM_DEFAULT_URL, apiKey: '' };

    async function loadProfileCard() {
        if (!window.pywebview || !window.pywebview.api) return;
        try {
            const res = await window.pywebview.api.get_user_profile();
            if (res && res.ok && res.profile) {
                const p = res.profile;
                document.getElementById('vp-name').innerText = p.name || '--';
                document.getElementById('vp-age').innerText = p.age ? p.age + '岁' : '--';
                document.getElementById('vp-hrv').innerText = p.hrv_baseline || '--';
                document.getElementById('vp-vo2').innerText = p.vo2max || '--';
                const mini = document.getElementById('mini-profile');
                if (mini) mini.style.display = 'flex';
            }
        } catch(e) {}
    }
    loadProfileCard();

    async function syncPersona(platform) {
        if (!window.pywebview || !window.pywebview.api) {
            showToast('⚠️ 请在桌面应用中同步数据');
            return;
        }
        const loadEl = document.getElementById('sync-loading');
        const loadText = document.getElementById('sync-loading-text');
        const garminBtn = document.getElementById('btn-sync-garmin');
        const corosBtn = document.getElementById('btn-sync-coros');
        if (loadEl) { loadEl.style.display = 'flex'; }
        if (loadText) loadText.innerText = '正在从' + (platform === 'garmin' ? '佳明' : '高驰') + '同步...';
        garminBtn && (garminBtn.disabled = true);
        corosBtn && (corosBtn.disabled = true);
        try {
            const res = await window.pywebview.api.fetch_mcp_persona(platform);
            if (loadEl) loadEl.style.display = 'none';
            garminBtn && (garminBtn.disabled = false);
            corosBtn && (corosBtn.disabled = false);
            if (res && res.ok && res.profile) {
                const p = res.profile;
                const pName = platform === 'garmin' ? '佳明' : '高驰';
                document.getElementById('vp-name').innerText = p.name || '--';
                document.getElementById('vp-age').innerText = p.age ? p.age + '岁' : '--';
                document.getElementById('vp-hrv').innerText = p.hrv_baseline || '--';
                document.getElementById('vp-vo2').innerText = p.vo2max || '--';
                const mini = document.getElementById('mini-profile');
                if (mini) mini.style.display = 'flex';
                const msg = '✅ 已同步 ' + pName + ' 最新生理数据。AI 领队已根据您的最新状态' + (p.hrv_baseline ? '（HRV: ' + p.hrv_baseline + 'ms）' : '') + '调整复盘建议。';
                appendChatMessage('assistant', msg);
                loadProfileCard();
            } else {
                showToast('⚠️ ' + (res && res.error ? res.error : '同步失败'));
            }
        } catch(e) {
            if (loadEl) loadEl.style.display = 'none';
            garminBtn && (garminBtn.disabled = false);
            corosBtn && (corosBtn.disabled = false);
            showToast('⚠️ 同步异常: ' + (e && e.message ? e.message : String(e)));
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg; toast.style.opacity = '1';
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { toast.style.opacity = '0'; }, 3500);
    }

    function togglePanel() {
        const panel = document.getElementById('info-panel');
        const btn = document.getElementById('toggle-btn');
        panel.classList.toggle('collapsed');
        btn.innerText = panel.classList.contains('collapsed') ? '▼' : '▲';
    }

    function toggleAISidebar() { document.getElementById('ai-sidebar').classList.toggle('collapsed'); }

    function switchAITab(tabId) {
        document.getElementById('tab-btn-report').classList.remove('active');
        document.getElementById('tab-btn-chat').classList.remove('active');
        document.getElementById('tab-report').style.display = 'none';
        document.getElementById('tab-chat').style.display = 'none';
        
        if (tabId === 'report') {
            document.getElementById('tab-btn-report').classList.add('active');
            document.getElementById('tab-report').style.display = 'block';
        } else {
            document.getElementById('tab-btn-chat').classList.add('active');
            document.getElementById('tab-chat').style.display = 'flex';
        }
    }

    // ==========================================
    // Cesium 引擎初始化
    // 这里使用轻量底图 + 椭球地形，优先保证首屏快速出球和稳定渲染。
    // ==========================================
    const initialDestination = Cesium.Cartesian3.fromDegrees(104.0, 35.0, 22000000);
    const viewer = new Cesium.Viewer('cesiumContainer', {
        imageryProvider: new Cesium.UrlTemplateImageryProvider({
            url: 'https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
            maximumLevel: 19
        }),
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        baseLayerPicker: false,
        geocoder: false,
        homeButton: false,
        infoBox: false,
        navigationHelpButton: false,
        sceneModePicker: false,
        timeline: false,
        animation: false,
        fullscreenButton: false
    });
    viewer.scene.fxaa = true;
    viewer.scene.globe.depthTestAgainstTerrain = true;
    viewer.scene.globe.baseColor = Cesium.Color.WHITE;
    viewer.scene.canvas.style.cursor = 'crosshair';
    viewer.camera.setView({ destination: initialDestination });

    const progressSlider = document.getElementById('progress-slider');
    const progressVal = document.getElementById('progress-val');
    progressSlider.addEventListener('input', () => {
        appState.progress = parseFloat(progressSlider.value);
        progressVal.innerText = Math.round(appState.progress) + '%';
        drawProfileChart();
    });

    document.getElementById('toggle-cp').addEventListener('change', (e) => {
        appState.showCP = e.target.checked; appState.pointEntities.forEach(ent => ent.show = appState.showCP);
    });
    document.getElementById('toggle-km').addEventListener('change', (e) => {
        appState.showKM = e.target.checked; appState.kmEntities.forEach(ent => ent.show = appState.showKM);
    });
    document.getElementById('toggle-peak').addEventListener('change', (e) => {
        appState.showPeak = e.target.checked; appState.peakEntities.forEach(ent => ent.show = appState.showPeak);
    });

    // ==========================================
    // 大模型 API 配置与逻辑
    // ==========================================
    const llmProviders = {
        'local_mcp': { url: 'http://localhost:3000/v1/chat/completions', models: [] },
        'deepseek': { url: 'https://api.deepseek.com/chat/completions', models: ['deepseek-chat', 'deepseek-reasoner'] },
        'zhipu': { url: 'https://open.bigmodel.cn/api/paas/v4/chat/completions', models: ['glm-4-flash', 'glm-4', 'glm-4-plus'] },
        'moonshot': { url: 'https://api.moonshot.cn/v1/chat/completions', models: ['moonshot-v1-8k', 'moonshot-v1-32k'] },
        'qwen': { url: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', models: ['qwen-turbo', 'qwen-plus', 'qwen-max'] },
        'minimax': { url: 'https://api.minimaxi.com/v1/chat/completions', models: ['MiniMax-m2.7', 'MiniMax-Text-01', 'abab6.5s-chat', 'abab6.5t-chat'] },
        'custom': { url: '', models: [] }
    };

    async function initLLMConfig() {
        if (window.pywebview && window.pywebview.api && typeof window.pywebview.api.get_llm_config === 'function') {
            try {
                const c = await window.pywebview.api.get_llm_config();
                if (c) {
                    currentLLMConfig = {
                        provider: c.provider || 'local_mcp',
                        model: c.model || 'openclaw',
                        url: (c.url && String(c.url).trim()) ? String(c.url).trim() : LLM_DEFAULT_URL,
                        apiKey: (c.api_key !== undefined && c.api_key !== null) ? String(c.api_key) : ''
                    };
                }
            } catch (e) { console.warn('get_llm_config', e); }
            return;
        }
        try {
            const saved = localStorage.getItem('llm_config_v2');
            if (saved) currentLLMConfig = { ...currentLLMConfig, ...JSON.parse(saved) };
        } catch (e) {}
    }
    initLLMConfig().catch(function () {});

    function updateLLMModels() {
        const provider = document.getElementById('llm-provider').value;
        const modelSelect = document.getElementById('llm-model');
        const customModelInput = document.getElementById('llm-custom-model');
        const urlInput = document.getElementById('llm-custom-url');
        const apiKeyHint = document.getElementById('llm-api-key-hint');
        const apiKeyInput = document.getElementById('llm-api-key');

        modelSelect.innerHTML = '';
        if (provider === 'custom' || provider === 'local_mcp') {
            modelSelect.style.display = 'none';
            customModelInput.style.display = 'block';
            if (provider === 'local_mcp' && (!customModelInput.value || customModelInput.value === 'qclaw/pool-kimi-k2.6' || customModelInput.value === '小高' || customModelInput.value === 'local-model')) {
                customModelInput.value = 'openclaw';
            }
        } else {
            modelSelect.style.display = 'block';
            customModelInput.style.display = 'none';
            llmProviders[provider].models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.innerText = m;
                modelSelect.appendChild(opt);
            });
            if (llmProviders[provider].models.includes(currentLLMConfig.model)) {
                modelSelect.value = currentLLMConfig.model;
            }
        }

        if (!urlInput._userModified) {
            urlInput.value = currentLLMConfig.url || llmProviders[provider]?.url || '';
        }

        if (provider === 'local_mcp') {
            apiKeyHint.innerText = '(选填/依网关配置)';
            apiKeyInput.placeholder = '如果您的网关没加密，留空即可';
        } else {
            apiKeyHint.innerText = '(必填)';
            apiKeyInput.placeholder = 'sk-...';
        }
    }

    function _markUrlModified() {
        const urlInput = document.getElementById('llm-custom-url');
        if (urlInput) urlInput._userModified = true;
    }

    async function openLLMConfig() {
        await initLLMConfig();
        document.getElementById('llm-provider').value = currentLLMConfig.provider || 'local_mcp';
        updateLLMModels();

        if (currentLLMConfig.provider === 'custom' || currentLLMConfig.provider === 'local_mcp') {
            document.getElementById('llm-custom-model').value = currentLLMConfig.model;
        } else if (llmProviders[currentLLMConfig.provider] && llmProviders[currentLLMConfig.provider].models.includes(currentLLMConfig.model)) {
            document.getElementById('llm-model').value = currentLLMConfig.model;
        }

        document.getElementById('llm-custom-url').value = currentLLMConfig.url || llmProviders[currentLLMConfig.provider]?.url || '';
        document.getElementById('llm-api-key').value = currentLLMConfig.apiKey || '';

        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('llm-config-modal').style.display = 'block';
    }

    async function saveLLMConfig() {
        const provider = document.getElementById('llm-provider').value;
        const apiKey = document.getElementById('llm-api-key').value.trim();
        let model = document.getElementById('llm-model').value;
        let url = document.getElementById('llm-custom-url').value.trim();

        if (provider === 'custom' || provider === 'local_mcp') {
            model = document.getElementById('llm-custom-model').value.trim();
            if (!model || !url) { showToast("⚠️ 自定义模式/本地网关下需填写模型名和接口地址"); return; }

            if (provider === 'local_mcp' && model !== 'openclaw' && !model.startsWith('openclaw/')) {
                model = 'openclaw/' + model;
            }
        } else {
            if (!url) url = llmProviders[provider].url;
        }

        currentLLMConfig = { provider, model, url, apiKey };

        if (window.pywebview && window.pywebview.api && typeof window.pywebview.api.save_llm_config === 'function') {
            try {
                const res = await window.pywebview.api.save_llm_config(provider, url, model, apiKey);
                if (!res || !res.ok) { showToast('保存失败: ' + (res && res.error ? res.error : '')); return; }
            } catch (e) {
                showToast('保存失败');
                return;
            }
        } else {
            try { localStorage.setItem('llm_config_v2', JSON.stringify(currentLLMConfig)); } catch (e) {}
        }
        showToast("✅ 大模型配置已保存！");
        closeModals();
    }

    function closeModals() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('edit-modal').style.display = 'none';
        document.getElementById('llm-config-modal').style.display = 'none';
        document.getElementById('sport-type-modal').style.display = 'none';
    }

    // Modal forms
    function openEditModal(id, currentName) {
        appState.editingCpId = id; appState.pendingNewCp = null;
        document.getElementById('edit-modal-title').innerText = '✏️ 编辑打卡点';
        document.getElementById('edit-cp-name').value = currentName;
        document.getElementById('btn-delete-cp').style.display = 'block';
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('edit-modal').style.display = 'block';
        setTimeout(() => document.getElementById('edit-cp-name').focus(), 100);
    }
    function openAddModal(lon, lat, alt) {
        appState.editingCpId = null; appState.pendingNewCp = { lon, lat, alt };
        document.getElementById('edit-modal-title').innerText = '📍 新增打卡点';
        document.getElementById('edit-cp-name').value = '';
        document.getElementById('btn-delete-cp').style.display = 'none';
        document.getElementById('modal-overlay').style.display = 'block';
        document.getElementById('edit-modal').style.display = 'block';
        setTimeout(() => document.getElementById('edit-cp-name').focus(), 100);
    }
    function saveCp() {
        const newName = document.getElementById('edit-cp-name').value.trim();
        if (!newName) { showToast("⚠️ 名称不能为空！"); return; }
        if (appState.editingCpId) {
            const pm = appState.placemarks.find(p => p.id === appState.editingCpId);
            if (pm) pm.name = newName; showToast(`✏️ 已修改为: ${newName}`);
        } else if (appState.pendingNewCp) {
            appState.placemarks.push({ 
                id: 'cp_user_' + Date.now(), name: newName, 
                lon: appState.pendingNewCp.lon, lat: appState.pendingNewCp.lat, alt: appState.pendingNewCp.alt         
            });
            showToast(`📍 成功新增: ${newName}`);
        }
        closeModals(); updateScene(); 
    }
    function deleteCp() {
        if (appState.editingCpId) {
            appState.placemarks = appState.placemarks.filter(p => p.id !== appState.editingCpId);
            showToast(`🗑️ 已删除该打卡点`); closeModals(); updateScene();
        }
    }

    // Markdown Parser
    function parseMarkdown(text) {
        return text.replace(/### (.*)/g, '<h4 style="color:#d8b4fe; margin-top:1em; margin-bottom:0.5em;">$1</h4>')
                   .replace(/## (.*)/g, '<h3 style="color:#a855f7; margin-top:1.5em; margin-bottom:0.5em; border-bottom:1px solid rgba(168,85,247,0.3); padding-bottom:5px;">$1</h3>')
                   .replace(/# (.*)/g, '<h2 style="color:#c084fc; margin-top:1em; margin-bottom:0.5em;">$1</h2>')
                   .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#f8fafc;">$1</strong>')
                   .replace(/\n\n/g, '<br><br>')
                   .replace(/\n/g, '<br>')
                   .replace(/- (.*)/g, '<li style="margin-left: 15px; margin-bottom: 4px;">$1</li>');
    }
    function appendChatMessage(role, content) {
        const contentDiv = document.getElementById('llm-report-content');
        const msgDiv = document.createElement('div');
        msgDiv.style.padding = "10px"; msgDiv.style.borderRadius = "8px"; msgDiv.style.marginBottom = "10px"; msgDiv.style.wordBreak = "break-word";
        
        if (role === 'user') {
            msgDiv.style.background = "rgba(168, 85, 247, 0.2)"; msgDiv.style.border = "1px solid rgba(168, 85, 247, 0.4)"; msgDiv.style.color = "#f8fafc";
            msgDiv.innerText = content; 
        } else {
            msgDiv.style.background = "rgba(255, 255, 255, 0.05)"; msgDiv.style.border = "1px solid rgba(255, 255, 255, 0.1)";
            msgDiv.innerHTML = parseMarkdown(content);
        }
        contentDiv.appendChild(msgDiv); contentDiv.scrollTop = contentDiv.scrollHeight;
    }

    function confirmSportType(type) {
        appState.sportType = type;
        closeModals();
        
        try {
            var aiReport = generateAIReport(appState.points);
            if (aiReport) { 
                renderAIAnalysis(aiReport); 
                switchAITab('report'); 
            }
        } catch(aiErr) { console.warn('AI分析报错:', aiErr); }
        
        resetChatUI();
    }

    async function resetChatUI() {
        if (window.pywebview && window.pywebview.api && typeof window.pywebview.api.reset_llm_session === 'function') {
            try { await window.pywebview.api.reset_llm_session(); } catch (e) {}
        }
        const chatContentDiv = document.getElementById('llm-report-content');
        const sportName = appState.sportType === 'trail_running' ? '越野跑' : '徒步';
        
        if (chatContentDiv) {
            chatContentDiv.innerHTML = `
                <div style="color:#94a3b8;font-size:0.8rem;text-align:center;margin-top:20px;">当前模式：<strong style="color:var(--primary);">${sportName}</strong>。选择需要生成的内容：</div>
                <div style="display:flex; flex-direction:column; gap:10px; margin-top: 15px;">
                    <button onclick="generateLLMReport(false)" class="secondary-btn" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">🗺️ 生成标准路书 (仅地形分析)</button>
                    <button onclick="generateLLMReport(true)" class="primary-btn" style="background: linear-gradient(135deg, #a855f7, #7e22ce); border:none;">🏃‍♂️ 个人成绩预测 (需高驰MCP)</button>
                </div>
            `;
        }
    }

    async function generateLLMReport(isPersonalized = false) {
        if (!window.pywebview || !window.pywebview.api || typeof window.pywebview.api.call_llm !== 'function') {
            showToast('AI 路书需在桌面应用（Python 后端）中使用');
            return;
        }
        if (!currentLLMConfig.url) { showToast("⚠️ API 接口地址为空，请检查配置"); openLLMConfig(); return; }
        if (!appState.points || appState.points.length < 2) { showToast("⚠️ 暂无轨迹数据可供分析"); return; }

        switchAITab('chat');
        const contentDiv = document.getElementById('llm-report-content');
        contentDiv.innerHTML = `
            <div id="llm-loading" style="text-align: center; margin-top: 40px; color: #94a3b8;">
                <div class="spinner" style="border-left-color: #a855f7; margin: 0 auto 15px auto;"></div>
                正在呼叫 <b>${currentLLMConfig.model}</b>（Python 后端）分析数据，请稍候...<br>
                <span style="font-size:0.7rem; opacity:0.6;">(大模型思考可能需要几秒到几十秒)</span>
            </div>
        `;

        const magic = isPersonalized ? PY_REPORT_PERSONALIZED : PY_REPORT_TERRAIN;
        try {
            const res = await window.pywebview.api.call_llm(magic, appState.sportType);
            if (!res || !res.ok) {
                contentDiv.innerHTML = '<div style="color: #ef4444; padding: 20px;"><b>❌ 请求失败</b><br>' + (res && res.error ? String(res.error) : '未知错误') + '</div>';
                return;
            }
            const text = res.content || '未获取到有效内容。';
            contentDiv.innerHTML = '';
            appendChatMessage('assistant', text);
        } catch (e) {
            contentDiv.innerHTML = '<div style="color: #ef4444; padding: 20px;"><b>❌ 请求失败</b><br>' + (e && e.message ? e.message : String(e)) + '</div>';
        }
    }

    async function sendLLMChat() {
        const inputEl = document.getElementById('llm-chat-input');
        const text = inputEl.value.trim();
        if (!text) return;

        if (!window.pywebview || !window.pywebview.api || typeof window.pywebview.api.call_llm !== 'function') {
            showToast('AI 对话需在桌面应用（Python 后端）中使用');
            return;
        }
        if (!currentLLMConfig.url) { showToast("⚠️ API 接口地址为空"); openLLMConfig(); return; }

        inputEl.value = '';
        appendChatMessage('user', text);

        const contentDiv = document.getElementById('llm-report-content');
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'llm-chat-loading';
        loadingDiv.innerHTML = '<div class="spinner" style="border-left-color: #a855f7; width:20px; height:20px; border-width:2px; margin: 10px auto;"></div>';
        contentDiv.appendChild(loadingDiv);
        contentDiv.scrollTop = contentDiv.scrollHeight;

        try {
            const res = await window.pywebview.api.call_llm(text, appState.sportType);
            document.getElementById('llm-chat-loading')?.remove();
            if (!res || !res.ok) {
                appendChatMessage('assistant', '❌ 发送失败: ' + (res && res.error ? String(res.error) : '未知错误'));
                return;
            }
            appendChatMessage('assistant', res.content || '（空回复）');
        } catch (e) {
            document.getElementById('llm-chat-loading')?.remove();
            appendChatMessage('assistant', '❌ 发送失败: ' + (e && e.message ? e.message : String(e)));
        }
    }

    // ==========================================
    // 轨迹解析与核心算法
    // ==========================================
    function haversine(p1, p2) {
        var dLat = (p2.lat - p1.lat) * Math.PI / 180;
        var dLon = (p2.lon - p1.lon) * Math.PI / 180;
        var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        return 6371000 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function calculateStats(points) {
        if (!points || points.length === 0) return { dist: 0, gain: 0, max: 0, time: 'N/A', kmMarkers: [], peakMarkers: [] };
        let dist = 0, gain = 0, maxAlt = -Infinity; let lastAlt = points[0].alt;
        const kmMarkers = []; let nextKm = 1;

        points[0].dist = 0; 
        
        for (let i = 1; i < points.length; i++) {
            const p1 = points[i - 1], p2 = points[i];
            const d = haversine(p1, p2) / 1000; 
            dist += d;
            points[i].dist = dist; 

            if (dist >= nextKm) { kmMarkers.push({ km: nextKm, lon: p2.lon, lat: p2.lat, alt: p2.alt }); nextKm++; }
            if (p2.alt > maxAlt) maxAlt = p2.alt;
            const diffAlt = p2.alt - lastAlt;
            if (diffAlt > 1.5) { gain += diffAlt; lastAlt = p2.alt; } else if (diffAlt < -1.5) { lastAlt = p2.alt; }
        }
        if (points[0].alt > maxAlt) maxAlt = points[0].alt;
        appState.totalDist = dist;
        
        let timeStr = 'N/A';
        if (points[0].time && points[points.length - 1].time) {
            const ms = new Date(points[points.length - 1].time) - new Date(points[0].time);
            if (ms > 0) timeStr = `${Math.floor(ms / 3600000)}h ${Math.floor((ms % 3600000) / 60000)}m`;
        }

        const peakMarkers = []; let maxPt = points[0];
        for (let i = 0; i < points.length; i++) {
            if (points[i].alt > maxPt.alt) maxPt = points[i];
            if (peakMarkers.length > 0 && haversine(peakMarkers[peakMarkers.length - 1], points[i]) < 250) continue; 
            
            let isPeak = true; let localMin = points[i].alt;
            for (let j = i - 1; j >= 0; j--) {
                if (haversine(points[i], points[j]) > 300) break;
                if (points[j].alt > points[i].alt) { isPeak = false; break; }
                if (points[j].alt < localMin) localMin = points[j].alt;
            }
            if (!isPeak) continue;
            for (let j = i + 1; j < points.length; j++) {
                if (haversine(points[i], points[j]) > 300) break;
                if (points[j].alt > points[i].alt) { isPeak = false; break; }
                if (points[j].alt < localMin) localMin = points[j].alt;
            }
            if (isPeak && (points[i].alt - localMin) >= 12) { 
                peakMarkers.push({ lon: points[i].lon, lat: points[i].lat, alt: points[i].alt, name: `⛰️ ${Math.round(points[i].alt)}m`, isHighest: false });
            }
        }

        if (maxPt) {
            let upgraded = false;
            for (let p of peakMarkers) {
                if (haversine(p, maxPt) < 300) {
                    p.name = `👑 最高点 ${Math.round(maxPt.alt)}m`; p.isHighest = true; p.lon = maxPt.lon; p.lat = maxPt.lat; p.alt = maxPt.alt;
                    upgraded = true; break;
                }
            }
            if (!upgraded) peakMarkers.push({ lon: maxPt.lon, lat: maxPt.lat, alt: maxPt.alt, name: `👑 最高点 ${Math.round(maxPt.alt)}m`, isHighest: true });
        }

        return { dist: dist.toFixed(2), gain: Math.round(gain), max: Math.round(maxAlt), time: timeStr, kmMarkers: kmMarkers, peakMarkers: peakMarkers };
    }

    function generateAIReport(points) {
        if (!points || points.length < 2) return null;
        var totalDistKm = parseFloat(document.getElementById('val-dist').innerText) || 0;
        var totalAscent = parseInt(document.getElementById('val-gain').innerText) || 0;
        var maxAlt = parseInt(document.getElementById('val-max').innerText) || 0;

        let startTimeStr = '未知时间';
        if (points[0] && points[0].time) {
            const d = new Date(points[0].time);
            startTimeStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        var totalDescent = 0, slopes = [], speeds = [], minAlt = Infinity, lastAlt = points[0].alt;

        for (var i = 0; i < points.length; i++) {
            var p = points[i];
            if (p.alt < minAlt) minAlt = p.alt;
            if (i > 0) {
                var prev = points[i-1];
                var dist = haversine(prev, p);
                var dAlt = p.alt - prev.alt;

                if (dAlt < -1.5) totalDescent += Math.abs(dAlt);
                if (dist > 5) {
                    var sp = (typeof p.slope_pct === 'number' && !isNaN(p.slope_pct)) ? p.slope_pct : (dAlt / dist * 100);
                    slopes.push(sp);
                }

                if (p.time && prev.time && dist > 0) {
                    var dt = (new Date(p.time) - new Date(prev.time)) / 1000;
                    if (dt > 0) speeds.push(dist / dt);
                }
            }
        }

        var upCount = 0, downCount = 0, maxSingleClimb = 0, hillState = 0; 
        var hillRefAlt = points[0].alt, hillPeak = points[0].alt, hillValley = points[0].alt;
        var hillThreshold = 15; 

        for (var i = 1; i < points.length; i++) {
            var alt = points[i].alt;
            if (hillState === 1) { 
                if (alt > hillPeak) { hillPeak = alt; } 
                else if (hillPeak - alt >= hillThreshold) {
                    var climb = hillPeak - hillValley;
                    if (climb >= hillThreshold) { upCount++; if (climb > maxSingleClimb) maxSingleClimb = climb; }
                    hillState = -1; hillValley = alt;
                }
            } else if (hillState === -1) { 
                if (alt < hillValley) { hillValley = alt; } 
                else if (alt - hillValley >= hillThreshold) {
                    if (hillPeak - hillValley >= hillThreshold) { downCount++; }
                    hillState = 1; hillPeak = alt;
                }
            } else { 
                if (alt - hillRefAlt >= hillThreshold) { hillState = 1; hillValley = hillRefAlt; hillPeak = alt; } 
                else if (hillRefAlt - alt >= hillThreshold) { hillState = -1; hillPeak = hillRefAlt; hillValley = alt; }
            }
        }
        if (hillState === 1) { var climb = hillPeak - hillValley; if (climb >= hillThreshold) { upCount++; if (climb > maxSingleClimb) maxSingleClimb = climb; } } 
        else if (hillState === -1) { if (hillPeak - hillValley >= hillThreshold) downCount++; }

        var avgSpeed = speeds.length > 0 ? speeds.reduce((a,b)=>a+b,0)/speeds.length : 0;
        var avgPaceMin = avgSpeed > 0 ? 1000 / 60 / avgSpeed : 0;

        var sortedSlopes = slopes.slice().sort((a,b)=>a-b);
        var trimN = Math.max(1, Math.floor(sortedSlopes.length * 0.05));
        var trimmedSlopes = sortedSlopes.slice(trimN, sortedSlopes.length - trimN);
        var maxSlope = 0, minSlope = 0;
        if (trimmedSlopes.length > 0) {
            maxSlope = trimmedSlopes[0]; minSlope = trimmedSlopes[0];
            for (var si = 1; si < trimmedSlopes.length; si++) {
                if (trimmedSlopes[si] > maxSlope) maxSlope = trimmedSlopes[si];
                if (trimmedSlopes[si] < minSlope) minSlope = trimmedSlopes[si];
            }
        }
        
        var uphillCount = 0, downhillCount = 0;
        for (var si = 0; si < trimmedSlopes.length; si++) {
            if (trimmedSlopes[si] > 3) uphillCount++;
            if (trimmedSlopes[si] < -3) downhillCount++;
        }
        var totalSlopePts = trimmedSlopes.length || 1;
        var uphillPct = Math.round(uphillCount / totalSlopePts * 100);
        var downhillPct = Math.round(downhillCount / totalSlopePts * 100);

        var diffScore = 0;
        if (totalDistKm > 5)  diffScore += 1; if (totalDistKm > 10) diffScore += 1; if (totalDistKm > 15) diffScore += 1;
        if (totalAscent > 200) diffScore += 1; if (totalAscent > 500) diffScore += 1; if (totalAscent > 800) diffScore += 1;
        if (maxSlope > 15) diffScore += 1; if (maxSlope > 25) diffScore += 1;
        if (uphillPct > 30) diffScore += 1; if (uphillPct > 50) diffScore += 1;

        var diffLabel = diffScore <= 2 ? '轻松' : diffScore <= 4 ? '中等' : diffScore <= 7 ? '困难' : '极限';
        var diffBadge = diffScore <= 2 ? 'ai-badge-easy' : diffScore <= 4 ? 'ai-badge-moderate' : diffScore <= 7 ? 'ai-badge-hard' : 'ai-badge-extreme';

        var estMinutes;
        var isTrailRunning = appState.sportType === 'trail_running';
        
        if (isTrailRunning) {
            let basePace = avgPaceMin > 0 ? Math.min(avgPaceMin, 12) : 7.5; 
            estMinutes = totalDistKm * basePace + (totalAscent / 100) * 12; 
        } else {
            let basePace = avgPaceMin > 0 ? Math.max(avgPaceMin, 10) : 17; 
            estMinutes = totalDistKm * basePace + (totalAscent / 100) * 15; 
        }

        var estH = Math.floor(estMinutes / 60), estM = Math.round(estMinutes % 60);

        var totalDistM = totalDistKm * 1000, paceSegs = [];
        var segCount = Math.min(5, Math.max(1, Math.floor(totalDistKm / 2)));
        var segDistTarget = totalDistM / segCount, segEnd = 0, accumulatedDist = 0;

        for (var pi = 0; pi < segCount && segEnd < points.length - 1; pi++) {
            var segAccum = 0, segStart = segEnd, startAlt = points[segStart].alt;
            while (segEnd < points.length - 1 && segAccum < segDistTarget) {
                var d = haversine(points[segEnd], points[segEnd+1]); segAccum += d; segEnd++;
            }
            if (segAccum < 50) continue; 
            var segSlope = ((points[segEnd].alt - startAlt) / segAccum) * 100; 
            var startKmStr = (accumulatedDist / 1000).toFixed(1);
            accumulatedDist += segAccum;
            var endKmStr = (accumulatedDist / 1000).toFixed(1);
            
            var baseSegPace = isTrailRunning ? 7.5 : 17;
            var segPaceVal = segSlope > 15 ? baseSegPace * 1.8 : segSlope > 10 ? baseSegPace * 1.5 : segSlope > 5 ? baseSegPace * 1.25 : segSlope > 2 ? baseSegPace * 1.1 : segSlope > -2 ? baseSegPace * 1.0 : segSlope > -8 ? baseSegPace * 0.9 : baseSegPace * 1.15; 
            var paceLabel = segSlope > 5 ? '上坡' : segSlope > 2 ? '微上' : segSlope < -8 ? '陡下' : segSlope < -2 ? '下坡' : '平路';
            paceSegs.push({ seg: paceLabel + ' ' + startKmStr + '-' + endKmStr + 'km', pace: Math.floor(segPaceVal) + ':' + String(Math.floor((segPaceVal%1)*60)).padStart(2,'0') + '/km' });
        }

        var supplies = [];
        if (totalDistKm > 3)  supplies.push({icon:'💧', name:'水 500ml', note:'基本补水'});
        if (totalDistKm > 5)  supplies.push({icon:'💧', name:'水 1.5L', note:'定时补充'});
        if (totalDistKm > 10) supplies.push({icon:'💧', name:'水 3L', note:'务必充足'});
        if (totalDistKm > 5)  supplies.push({icon:'🍌', name:'能量胶/棒', note:'定期补充'});
        if (totalDistKm > 12) supplies.push({icon:'🔋', name:'电解质', note:'防止抽筋'});
        if (totalAscent > 500) supplies.push({icon:'🧂', name:'盐丸', note:'出汗补充'});

        var restPoints = [], restCount = Math.min(4, Math.max(1, Math.floor(totalDistKm / 3))), restDistTarget = totalDistM / (restCount + 1), rAccum = 0;
        for (var r = 1; r < points.length && restPoints.length < restCount; r++) {
            rAccum += haversine(points[r-1], points[r]);
            if (rAccum >= restDistTarget * (restPoints.length + 1)) {
                restPoints.push({ name: (rAccum / 1000).toFixed(1) + 'km 处', distance: '海拔 ' + Math.round(points[r].alt) + 'm', altitude: Math.round(points[r].alt), duration: isTrailRunning ? '1-3分钟' : '5-10分钟', suggestion: isTrailRunning ? '快补水、调整呼吸' : '补水、拉伸、进食' });
            }
        }

        var met = isTrailRunning ? (8.0 + totalAscent / 100 * 1.5) : (4.0 + totalAscent / 100 * 1.0);
        var totalCal = Math.round(met * 72 * (estMinutes / 60 || totalDistKm / 4));
        var energy = Math.min(100, Math.round(totalDistKm * 3 + totalAscent / 20));
        var altRange = maxAlt - minAlt;

        return {
            startTimeStr: startTimeStr,
            totalDist: totalDistKm, totalAscent: totalAscent, totalDescent: Math.round(totalDescent),
            upCount: upCount, downCount: downCount, maxSingleClimb: maxSingleClimb, avgPace: avgPaceMin,
            maxAlt: maxAlt, minAlt: Math.round(minAlt), maxSlope: maxSlope, minSlope: minSlope,
            uphillPct: uphillPct, downhillPct: downhillPct, diffLabel: diffLabel, diffBadge: diffBadge, diffScore: diffScore,
            estTime: estH + '小时' + estM + '分钟', paceSegs: paceSegs, supplies: supplies, restPoints: restPoints,
            totalCal: totalCal, energy: energy, energyLevel: energy > 80 ? '极高' : energy > 60 ? '较高' : energy > 40 ? '中等' : '较低',
            energyColor: energy > 80 ? '#ef4444' : energy > 60 ? '#f59e0b' : energy > 40 ? '#3b82f6' : '#22c55e',
            altRange: Math.round(altRange), 
            altAnalysis: altRange < 100 ? '地形平坦，海拔变化很小。' : altRange < 300 ? '海拔有一定起伏，注意节奏。' : altRange < 600 ? '海拔变化较大，需要较好心肺能力。' : '海拔变化剧烈，需要充足的体能储备。'
        };
    }

    async function fetchLocationName(lat, lon) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=zh-CN`);
            const data = await response.json();
            let locName = '未知区域';
            if (data && data.address) {
                locName = data.address.city || data.address.town || data.address.county || data.address.state || data.address.province || data.name || '未知区域';
            }
            const el = document.getElementById('track-location-name');
            if (el) el.innerText = locName;
        } catch (e) {
            const el = document.getElementById('track-location-name');
            if (el) el.innerText = `${lon.toFixed(2)}, ${lat.toFixed(2)}`;
        }
    }

    function parseGPX(text) {
        const xml = new DOMParser().parseFromString(text, "text/xml");
        let trkpts = Array.from(xml.getElementsByTagName('trkpt'));
        if(trkpts.length === 0) trkpts = Array.from(xml.getElementsByTagNameNS('*', 'trkpt'));
        
        const points = trkpts.map(pt => {
            let hr = null;
            let ext = pt.getElementsByTagName('extensions')[0] || pt.getElementsByTagNameNS('*', 'extensions')[0];
            if (ext) {
                let hrNode = ext.getElementsByTagName('hr')[0] || ext.getElementsByTagNameNS('*', 'hr')[0];
                if (hrNode) hr = parseInt(hrNode.textContent);
            }
            return {
                lat: parseFloat(pt.getAttribute('lat')), lon: parseFloat(pt.getAttribute('lon')),
                alt: parseFloat((pt.getElementsByTagName('ele')[0] || pt.getElementsByTagNameNS('*', 'ele')[0])?.textContent || 0),
                time: (pt.getElementsByTagName('time')[0] || pt.getElementsByTagNameNS('*', 'time')[0]) ? new Date((pt.getElementsByTagName('time')[0] || pt.getElementsByTagNameNS('*', 'time')[0]).textContent) : null,
                hr: hr
            };
        });
        
        let wpts = Array.from(xml.getElementsByTagName('wpt'));
        if(wpts.length === 0) wpts = Array.from(xml.getElementsByTagNameNS('*', 'wpt'));
        const placemarks = wpts.map((pt, i) => {
            let name = (pt.getElementsByTagName('name')[0] || pt.getElementsByTagNameNS('*', 'name')[0])?.textContent?.trim() || `打卡点 ${i + 1}`;
            return { id: 'cp_gpx_' + Date.now() + '_' + i, name: name, lat: parseFloat(pt.getAttribute('lat')), lon: parseFloat(pt.getAttribute('lon')), alt: parseFloat((pt.getElementsByTagName('ele')[0] || pt.getElementsByTagNameNS('*', 'ele')[0])?.textContent || 0) };
        });
        return { points, placemarks };
    }

    function parseKML(xmlDoc) {
        const points = [], placemarks = [];
        
        // 尝试提取时间戳
        let times = Array.from(xmlDoc.getElementsByTagName('when')).concat(Array.from(xmlDoc.getElementsByTagNameNS('*', 'when')));
        
        let coordsList = Array.from(xmlDoc.getElementsByTagName('gx:coord'));
        if (coordsList.length === 0) coordsList = Array.from(xmlDoc.getElementsByTagNameNS('*', 'coord'));
        if (coordsList.length > 0) {
            coordsList.forEach((node, i) => {
                const parts = node.textContent.trim().split(/\s+/);
                if (parts.length >= 2) {
                    let time = null;
                    if (times[i]) time = new Date(times[i].textContent);
                    points.push({ lon: parseFloat(parts[0]), lat: parseFloat(parts[1]), alt: parseFloat(parts[2] || 0), time: time });
                }
            });
        } else {
            const coordsNodes = Array.from(xmlDoc.getElementsByTagName('coordinates')).concat(Array.from(xmlDoc.getElementsByTagNameNS('*', 'coordinates')));
            let trackNode = null, maxLen = 0;
            coordsNodes.forEach(node => { const text = node.textContent.trim(); if (text.length > maxLen) { maxLen = text.length; trackNode = node; } });
            if (trackNode) {
                // KML 轨迹点通常不带时间，或者时间在 TimeSpan/TimeStamp 中
                trackNode.textContent.trim().split(/[\s\r\n]+/).forEach(pair => { 
                    const parts = pair.split(','); 
                    if (parts.length >= 2) points.push({ lon: parseFloat(parts[0]), lat: parseFloat(parts[1]), alt: parseFloat(parts[2] || 0), time: null }); 
                });
            }
        }
        return { points, placemarks };
    }

    function parseFIT(arrayBuffer) {
        return new Promise((resolve, reject) => {
            if (!window.FitParser) return reject("找不到 FIT 解析库。请检查网络。");
            const fitParser = new window.FitParser({ force: true, speedUnit: 'km/h', lengthUnit: 'km', temperatureUnit: 'celsius', elapsedRecordField: true, mode: 'list' });
            fitParser.parse(arrayBuffer, (error, data) => {
                if (error) return reject(error);
                const points = [];
                if (data.records) {
                    data.records.forEach(r => {
                        if (r.position_lat && r.position_long) points.push({ lat: r.position_lat, lon: r.position_long, alt: r.altitude || 0, time: r.timestamp, hr: r.heart_rate || null });
                    });
                }
                resolve({ points, placemarks: [] }); 
            });
        });
    }

    function drawProfileChart() {
        const canvas = document.getElementById('profile-canvas');
        if (!canvas || !appState.points || appState.points.length === 0) return;

        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        
        const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
        const padding = { top: 35, right: 25, bottom: 25, left: 45 };
        const drawWidth = rect.width - padding.left - padding.right;
        const drawHeight = rect.height - padding.top - padding.bottom;
        
        ctx.clearRect(0, 0, rect.width, rect.height);
        
        const maxAlt = appState.maxAltitude, minAlt = appState.minAltitude, altRange = maxAlt - minAlt || 1, maxDist = appState.totalDist;
        const getX = (dist) => padding.left + (dist / maxDist) * drawWidth;
        const getY = (alt) => padding.top + drawHeight - ((alt - minAlt) / altRange) * drawHeight;
        
        ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.font = '10px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        
        for (let i = 0; i <= 3; i++) {
            const alt = minAlt + (altRange * i) / 3, y = getY(alt);
            ctx.moveTo(padding.left, y); ctx.lineTo(rect.width - padding.right, y);
            ctx.fillText(Math.round(alt) + 'm', padding.left - 8, y);
        }
        
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        for (let i = 0; i <= 5; i++) {
            const dist = (maxDist * i) / 5, x = getX(dist);
            ctx.moveTo(x, padding.top); ctx.lineTo(x, rect.height - padding.bottom);
            ctx.fillText(dist.toFixed(1) + 'km', x, rect.height - padding.bottom + 8);
        }
        ctx.stroke();

        ctx.beginPath(); ctx.moveTo(getX(appState.points[0].dist), getY(minAlt));
        appState.points.forEach(p => ctx.lineTo(getX(p.dist), getY(p.alt)));
        ctx.lineTo(getX(appState.points[appState.points.length - 1].dist), getY(minAlt)); ctx.closePath();
        
        const gradient = ctx.createLinearGradient(0, padding.top, 0, rect.height - padding.bottom);
        gradient.addColorStop(0, 'rgba(100, 116, 139, 0.9)'); gradient.addColorStop(1, 'rgba(100, 116, 139, 0.1)'); 
        ctx.fillStyle = gradient; ctx.fill();
        
        ctx.beginPath();
        appState.points.forEach((p, idx) => { if (idx === 0) ctx.moveTo(getX(p.dist), getY(p.alt)); else ctx.lineTo(getX(p.dist), getY(p.alt)); });
        ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 1.5; ctx.stroke();
        
        const progressIdx = Math.floor((appState.points.length - 1) * (appState.progress / 100));
        const currentPoint = appState.points[progressIdx];
        if (currentPoint) {
            const cx = getX(currentPoint.dist), cy = getY(currentPoint.alt);
            ctx.beginPath(); ctx.setLineDash([4, 4]); ctx.moveTo(cx, cy + 6); ctx.lineTo(cx, rect.height - padding.bottom);
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)'; ctx.lineWidth = 1; ctx.stroke(); ctx.setLineDash([]);

            ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fillStyle = '#ef4444'; ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
            ctx.fillText(`${Math.round(currentPoint.alt)}m`, cx, cy - 10);
        }
    }

    // ==========================================

        const exaggeration = 2.0; 
        
        appState.fullPositions = []; appState.fullMaxHeights = []; appState.fullMinHeights = [];
        appState.points.forEach(p => {
            const visualAlt = (p.alt - appState.minAltitude) * exaggeration + 30;
            appState.fullPositions.push(Cesium.Cartesian3.fromDegrees(p.lon, p.lat, visualAlt));
            appState.fullMaxHeights.push(visualAlt); appState.fullMinHeights.push(30);

        if (appState.remainingTrackEntity) viewer.entities.remove(appState.remainingTrackEntity);
        if (appState.completedTrackEntity) viewer.entities.remove(appState.completedTrackEntity);

            polyline: {
                positions: new Cesium.CallbackProperty(() => appState.fullPositions.slice(Math.floor((appState.fullPositions.length - 1) * (appState.progress / 100))), false),

                id: pm.id, name: pm.name, position: Cesium.Cartesian3.fromDegrees(pm.lon, pm.lat, visualAlt), show: appState.showCP,

                label: { text: pm.name, font: '14px sans-serif', fillColor: Cesium.Color.WHITE, outlineColor: Cesium.Color.BLACK, outlineWidth: 3, style: Cesium.LabelStyle.FILL_AND_OUTLINE, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -15), distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 15000) }

        appState.kmMarkers.forEach(km => {

            const entity = viewer.entities.add({

    function applyDataAndRender(data, filename = "自定义轨迹") {
        appState.points = data.points; appState.placemarks = data.placemarks;
        appState.progress = 100; document.getElementById('progress-slider').value = 100; document.getElementById('progress-val').innerText = '100%';

        const stats = calculateStats(appState.points);
        appState.kmMarkers = stats.kmMarkers; appState.peakMarkers = stats.peakMarkers; 

        document.getElementById('val-dist').innerText = stats.dist + ' km'; document.getElementById('val-gain').innerText = stats.gain + ' m';
        document.getElementById('val-time').innerText = stats.time; 
        
        // 智能化更新标题 (如果原始名称太通用)
        let displayTitle = filename;
        if (filename === '轨迹' || filename === '自定义轨迹' || filename === 'Untitled') {
            if (appState.points.length > 0 && appState.points[0].time) {
                const d = new Date(appState.points[0].time);
                displayTitle = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${stats.dist}km`;
            }
        }
        document.getElementById('track-title').innerText = displayTitle;

        // 防栈溢出
        let minAlt = Infinity, maxAlt = -Infinity, minLon = Infinity, maxLon = -Infinity, minLat = Infinity, maxLat = -Infinity;
        for (let i = 0; i < appState.points.length; i++) {
            let p = appState.points[i];
            if (p.alt < minAlt) minAlt = p.alt; if (p.alt > maxAlt) maxAlt = p.alt;
            if (p.lon < minLon) minLon = p.lon; if (p.lon > maxLon) maxLon = p.lon;
            if (p.lat < minLat) minLat = p.lat; if (p.lat > maxLat) maxLat = p.lat;
        }
        appState.minAltitude = minAlt === Infinity ? 0 : minAlt; appState.maxAltitude = maxAlt === -Infinity ? 0 : maxAlt;
        document.getElementById('val-max').innerText = Math.round(appState.maxAltitude) + ' m';
        
        appState.centerPosition = Cesium.Cartesian3.fromDegrees((minLon + maxLon) / 2, (minLat + maxLat) / 2);
        currentRange = Math.max((maxLon - minLon) * 100000, (maxLat - minLat) * 111000, 1000) * 1.5; 

        updateScene(); drawProfileChart(); 
        viewer.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
        viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees((minLon + maxLon) / 2, (minLat + maxLat) / 2, currentRange), orientation: { heading: 0, pitch: Cesium.Math.toRadians(-85), roll: 0.0 }, duration: 2.5 });

        if (window.pywebview && window.pywebview.api && typeof window.pywebview.api.sync_track_context === 'function') {
            window.pywebview.api.sync_track_context(JSON.stringify({
                points: appState.points,
                placemarks: appState.placemarks,
                filename: filename
            })).catch(function () {});
        }

        // 导入完毕后弹出运动类型选择框
        document.getElementById('sport-type-modal').style.display = 'block';
        document.getElementById('modal-overlay').style.display = 'block';
    }

    // ==========================================
    // 摄像机/交互事件
