    function updateCamera(headingDeg, pitchDeg) {
        if (!appState.centerPosition) return;
        const dist = Cesium.Cartesian3.distance(appState.centerPosition, viewer.camera.position);
        if (dist > 100 && dist < 80000) currentRange = dist;
        viewer.camera.lookAt(appState.centerPosition, new Cesium.HeadingPitchRange(Cesium.Math.toRadians(headingDeg), Cesium.Math.toRadians(pitchDeg), currentRange));
        viewer.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
    }
    function setViewProfile() { if (appState.centerPosition) updateCamera(Cesium.Math.toDegrees(viewer.camera.heading), 0); }

    let rotateInterval;
    document.getElementById('btn-auto-rotate').addEventListener('click', (e) => {
        const btn = e.target;
        if(btn.innerText.includes('▶')) {
            btn.innerText = '⏸ 暂停'; btn.style.background = 'rgba(59, 130, 246, 0.8)'; btn.style.borderColor = '#2563eb';
            rotateInterval = setInterval(() => { updateCamera((Cesium.Math.toDegrees(viewer.camera.heading) + 0.3) % 360, Cesium.Math.toDegrees(viewer.camera.pitch)); }, 30);
        } else {
            btn.innerText = '▶ 漫游'; btn.style.background = 'rgba(255,255,255,0.1)'; btn.style.borderColor = 'rgba(255,255,255,0.2)';
            clearInterval(rotateInterval);
        }
    });

    viewer.scene.screenSpaceCameraController.enableRotate = false; viewer.scene.screenSpaceCameraController.enableTranslate = false;
    viewer.scene.screenSpaceCameraController.enableZoom = false; viewer.scene.screenSpaceCameraController.enableTilt = false; viewer.scene.screenSpaceCameraController.enableLook = false;

    let isDragging = false; const gestureHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    gestureHandler.setInputAction(function () { isDragging = true; }, Cesium.ScreenSpaceEventType.LEFT_DOWN);
    gestureHandler.setInputAction(function () { isDragging = false; }, Cesium.ScreenSpaceEventType.LEFT_UP);
    window.addEventListener('mouseup', () => { isDragging = false; }); window.addEventListener('touchend', (e) => { if(e.touches.length === 0) isDragging = false; });

    gestureHandler.setInputAction(function (movement) {
        if (isDragging && appState.centerPosition) {
            const deltaX = movement.endPosition.x - movement.startPosition.x, deltaY = movement.endPosition.y - movement.startPosition.y;
            let h = Cesium.Math.toDegrees(viewer.camera.heading) - deltaX * 0.3, p = Math.max(-85, Math.min(0, Cesium.Math.toDegrees(viewer.camera.pitch) - deltaY * 0.3));
            updateCamera((h % 360 + 360) % 360, p);
        }
    }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

    viewer.scene.canvas.addEventListener('wheel', function(e) {
        e.preventDefault(); if (!appState.centerPosition) return;
        if (e.ctrlKey) {
            const zoomAmount = e.deltaY * ((viewer.camera.positionCartographic.height || 1000) / 150);
            if (zoomAmount > 0) viewer.camera.zoomOut(zoomAmount); else viewer.camera.zoomIn(-zoomAmount);
            currentRange = Cesium.Cartesian3.distance(appState.centerPosition, viewer.camera.position);
        } else {
            const metersPerPixel = (viewer.camera.positionCartographic.height || 1000) / viewer.scene.canvas.clientHeight;
            const rightAmt = -e.deltaX * metersPerPixel * 0.8, upAmt = e.deltaY * metersPerPixel * 0.8; 
            viewer.camera.moveRight(rightAmt); viewer.camera.moveUp(upAmt);
            const trans = Cesium.Cartesian3.add(Cesium.Cartesian3.multiplyByScalar(viewer.camera.right, rightAmt, new Cesium.Cartesian3()), Cesium.Cartesian3.multiplyByScalar(viewer.camera.up, upAmt, new Cesium.Cartesian3()), new Cesium.Cartesian3());
            Cesium.Cartesian3.add(appState.centerPosition, trans, appState.centerPosition);
            viewer.scene.globe.ellipsoid.scaleToGeodeticSurface(appState.centerPosition, appState.centerPosition);
        }
    }, { passive: false });

    // 文件导入：桌面壳优先走 Python（gpxpy / fitparse + 坡度），浏览器环境仍用 <input type=file> + 前端解析
    async function triggerTrackImport() {
        if (window.pywebview && window.pywebview.api && typeof window.pywebview.api.pick_and_parse_track === 'function') {
            const loader = document.getElementById('loading');
            if (loader) {
                loader.style.display = 'flex';
                setTimeout(function () { loader.style.opacity = '1'; }, 10);
                document.getElementById('loading-text').innerText = '正在解析轨迹（Python）…';
            }
            try {
                const res = await window.pywebview.api.pick_and_parse_track();
                if (!res || !res.ok) {
                    if (res && res.cancelled) return;
                    showToast('⚠️ 导入失败: ' + (res && res.error ? res.error : '未知错误'));
                    return;
                }
                if (!res.data || !res.data.points || res.data.points.length === 0) {
                    showToast('⚠️ 未提取到有效经纬度信息。');
                    return;
                }
                applyDataAndRender(res.data, res.filename || '轨迹');
            } catch (err) {
                showToast('⚠️ 导入失败: ' + (err && err.message ? err.message : String(err)));
            } finally {
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(function () { loader.style.display = 'none'; }, 800);
                }
            }
            return;
        }
        document.getElementById('file-upload').click();
    }

    function downloadFile(content, fileName, mimeType) {
        // 自动清理文件名中的非法字符
        const safeName = fileName.replace(/[\\/:*?"<>|]/g, '_');
        // pywebview / WKWebView 对 blob + <a download> 另存为支持很差，走原生「另存为」
        if (window.pywebview && window.pywebview.api && typeof window.pywebview.api.save_text_file === 'function') {
            window.pywebview.api.save_text_file(safeName, content).then(function (res) {
                if (res && res.ok) showToast('已保存：' + (res.path || safeName));
                else if (res && res.cancelled) { /* 用户取消 */ }
                else if (res && res.error) showToast('保存失败：' + res.error);
            }).catch(function () { showToast('保存失败'); });
            return;
        }
        const blob = new Blob([content], { type: mimeType }), url = URL.createObjectURL(blob), a = document.createElement('a');
        a.href = url; a.download = safeName; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    /**
     * 生成智能化文件名：[日期]_[地点]_[原始名]_[距离]km
     */
    function getSmartFileName(extension) {
        let nameParts = [];
        
        // 1. 日期 (YYYYMMDD)
        let startTime = null;
        if (appState.points && appState.points.length > 0) {
            for (let i = 0; i < Math.min(appState.points.length, 100); i++) {
                let p = appState.points[i];
                if (p.time) { 
                    const d = new Date(p.time);
                    if (!isNaN(d.getTime())) { startTime = p.time; break; }
                }
            }
        }
        if (startTime) {
            try {
                const d = new Date(startTime);
                const dateStr = d.getFullYear() + 
                    String(d.getMonth() + 1).padStart(2, '0') + 
                    String(d.getDate()).padStart(2, '0');
                nameParts.push(dateStr);
            } catch(e) { console.warn('SmartName Date Error:', e); }
        }

        // 2. 地点 (从 AI 面板获取)
        const locEl = document.getElementById('track-location-name');
        if (locEl) {
            const locText = locEl.innerText.trim();
            if (locText && !['查询中...', '未知区域', '正在获取位置...', '查询中', '...'].includes(locText)) {
                // 过滤掉经纬度形式的名称 (如 104.12, 30.12)
                if (!/^-?\d+(\.\d+)?,\s*-?\d+/.test(locText)) {
                    nameParts.push(locText);
                }
            }
        }

        // 3. 原始名称 (去掉扩展名)
        const currentTitle = document.getElementById('track-title').innerText.trim();
        if (currentTitle && !['等待导入轨迹...', '自定义轨迹', '轨迹', 'Untitled'].includes(currentTitle)) {
            // 如果已经是智能生成的（包含日期和距离），则不再重复添加
            if (!/^\d{8}_.*km$/.test(currentTitle)) {
                const baseName = currentTitle.replace(/\.(gpx|kml|fit)$/i, '');
                nameParts.push(baseName);
            } else {
                return currentTitle + "." + extension;
            }
        }

        // 4. 距离 (保留1位小数)
        const distVal = parseFloat(document.getElementById('val-dist').innerText);
        if (!isNaN(distVal) && distVal > 0) {
            nameParts.push(distVal.toFixed(1) + 'km');
        } else if (appState.totalDist > 0) {
            nameParts.push(appState.totalDist.toFixed(1) + 'km');
        }

        if (nameParts.length === 0) return "3DTrack." + extension;
        
        // 过滤重复和空值
        const finalParts = [];
        const seen = new Set();
        nameParts.forEach(p => {
            const clean = String(p).trim();
            if (clean && !seen.has(clean)) {
                finalParts.push(clean);
                seen.add(clean);
            }
        });
        
        const result = finalParts.join('_') + "." + extension;
        console.log('Generated Smart Filename:', result);
        return result;
    }

    function exportGPX() {
        if (!appState.points.length) { showToast("⚠️ 无轨迹可导出！"); return; }
        const smartName = getSmartFileName('gpx');
        const internalName = smartName.replace(/\.gpx$/i, '');
        let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="3DTrackViewer">\n`;
        appState.placemarks.forEach(pm => { gpx += `  <wpt lat="${pm.lat.toFixed(6)}" lon="${pm.lon.toFixed(6)}"><ele>${pm.alt.toFixed(1)}</ele><name>${pm.name}</name></wpt>\n`; });
        gpx += `  <trk><name>${internalName}</name><trkseg>\n`;
        appState.points.forEach(p => {
            gpx += `      <trkpt lat="${p.lat.toFixed(6)}" lon="${p.lon.toFixed(6)}"><ele>${p.alt.toFixed(1)}</ele>`;
            if (p.time) gpx += `<time>${new Date(p.time).toISOString()}</time>`;
            if (p.hr) gpx += `<extensions><TrackPointExtension><hr>${p.hr}</hr></TrackPointExtension></extensions>`;
            gpx += `</trkpt>\n`;
        });
        gpx += `    </trkseg></trk></gpx>`;
        downloadFile(gpx, smartName, 'application/gpx+xml');
    }

    function exportKML() {
        if (!appState.points.length) { showToast("⚠️ 无轨迹可导出！"); return; }
        const smartName = getSmartFileName('kml');
        const internalName = smartName.replace(/\.kml$/i, '');
        let kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n  <Document>\n    <name>${internalName}</name>\n`;
        appState.placemarks.forEach(pm => { kml += `    <Placemark><name>${pm.name}</name><Point><coordinates>${pm.lon.toFixed(6)},${pm.lat.toFixed(6)},${pm.alt.toFixed(1)}</coordinates></Point></Placemark>\n`; });
        kml += `    <Placemark><name>Track</name><LineString><coordinates>\n`;
        appState.points.forEach(p => { kml += `${p.lon.toFixed(6)},${p.lat.toFixed(6)},${p.alt.toFixed(1)} `; });
        kml += `\n        </coordinates></LineString></Placemark>\n  </Document>\n</kml>`;
        downloadFile(kml, smartName, 'application/vnd.google-earth.kml+xml');
    }

    document.getElementById('file-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const loader = document.getElementById('loading');
        if (loader) { loader.style.display = 'flex'; setTimeout(() => loader.style.opacity = '1', 10); document.getElementById('loading-text').innerText = `正在解析 ${file.name}...`; }
        try {
            let result = null; const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'gpx') result = parseGPX(await file.text());
            else if (ext === 'kml') result = parseKML(new DOMParser().parseFromString(await file.text(), "text/xml"));
            else if (ext === 'fit') result = await parseFIT(await file.arrayBuffer());
            else throw new Error("格式不支持！请选择 .fit, .gpx, 或 .kml");
            if (result && result.points.length > 0) applyDataAndRender(result, file.name);
            else throw new Error("未提取到有效经纬度信息。");
        } catch (err) { showToast("⚠️ 解析失败: " + err.message); } 
        finally { if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 800); } e.target.value = ''; }
    });

    // ==========================================
    // 地图与剖面图交互编辑打卡点
    // ==========================================
    gestureHandler.setInputAction(function (movement) {
        const pickedObject = viewer.scene.pick(movement.position);
        if (Cesium.defined(pickedObject) && pickedObject.id) {
            const entityId = typeof pickedObject.id === 'string' ? pickedObject.id : pickedObject.id.id;
            if (entityId && entityId.startsWith('cp_')) { openEditModal(entityId, appState.placemarks.find(p => p.id === entityId)?.name); return; }
            if (entityId && entityId.startsWith('peak_')) return; 
        }
        if (appState.points.length > 0) {
            let earthPosition;
            try { earthPosition = viewer.scene.pickPosition(movement.position); } catch(e) {}
            if (!Cesium.defined(earthPosition)) earthPosition = viewer.camera.pickEllipsoid(movement.position, viewer.scene.globe.ellipsoid);
            if (Cesium.defined(earthPosition)) {
                const cart = Cesium.Cartographic.fromCartesian(earthPosition), lon = Cesium.Math.toDegrees(cart.longitude), lat = Cesium.Math.toDegrees(cart.latitude);
                let nearestAlt = cart.height || 0, minDist = Infinity, nearestPoint = null;
                appState.points.forEach(p => {
                    const dist = Math.pow(p.lon - lon, 2) + Math.pow(p.lat - lat, 2);
                    if (dist < minDist) { minDist = dist; nearestAlt = p.alt; nearestPoint = p; }
                });
                if (minDist < 0.0005 && nearestPoint) openAddModal(nearestPoint.lon, nearestPoint.lat, nearestAlt);
            }
        }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    document.getElementById('profile-canvas').addEventListener('click', function(e) {
        if (!appState.points || appState.points.length === 0) return;
        const rect = this.getBoundingClientRect(), clickX = e.clientX - rect.left, padding = { top: 35, right: 25, bottom: 25, left: 45 }, drawWidth = rect.width - padding.left - padding.right;
        if (clickX < padding.left || clickX > rect.width - padding.right) return;
        const targetDist = ((clickX - padding.left) / drawWidth) * appState.totalDist;
        let nearestPoint = appState.points[0], minDistDiff = Math.abs(appState.points[0].dist - targetDist);
        for (let i = 1; i < appState.points.length; i++) {
            const distDiff = Math.abs(appState.points[i].dist - targetDist);
            if (distDiff < minDistDiff) { minDistDiff = distDiff; nearestPoint = appState.points[i]; }
        }
        if (nearestPoint) openAddModal(nearestPoint.lon, nearestPoint.lat, nearestPoint.alt);
    });

    const loadingText = document.getElementById('loading-text');
    if (loadingText) loadingText.innerText = '正在初始化 3D 地球...';

    setTimeout(() => {
        viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(104.0, 35.0, 15000000), duration: 2.0 });
        const loader = document.getElementById('loading');
        if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 800); }
        showToast("💡 随时点击轨迹新增打卡点，点击已有打卡点修改或删除！");
    }, 1000); 

</script>
</body>
</html>
